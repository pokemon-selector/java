<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ついてくるもの - 幻想の庭</title>
    <link rel="stylesheet" href="/pokemon-selector/java/style.css">
</head>
<body>

    <nav style="padding: 15px 30px; background: transparent; text-align: left;">
        <a href="room.html" style="color: #666; text-decoration: none; font-size: 0.9rem;">◁ 戻る</a>
    </nav>

    <div class="novel-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div class="novel-title" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 30px; text-align: center;">第一章「ついてくるもの」</div>
        
        <div id="novel-body-text">
            <p class="novel-p">あの記、僕は見てはいけないものを見た。夕暮れの学校の帰り道、細い路地の奥に、ウズくまる影があった。</p>
            <p class="novel-p">影は、こちらをじっと見つめている気がした。怖くなって走って逃げたが、足音がピッタリとしがみつく付いてくる。</p>
            
            <p class="novel-p">
                誰かが、僕のログを、僕の背中を、ずっと覗いている。
                <span class="vibrate-text">ウ</span>
                <span class="vibrate-text">シ</span>
                <span class="vibrate-text">ロ</span>
                <span class="vibrate-text">ウ</span>
                。
            </p>
            
            <p class="novel-p">息を切らして部屋に飛び込み、鍵を閉めた。しかし、部屋の隅から細い声が聞こえる。気付けば、僕のウエに、何かがいる。</p>
        </div>

        <div class="ans-box" style="margin-top: 60px; border-top: 1px dotted #ccc; padding-top: 30px; text-align: center;">
            <p style="font-size: 0.9rem; color: #555; margin-bottom: 15px;">この小説に潜む異変を解決するキーワードを入力してください</p>
            <input type="text" id="solve-input" class="ans-input" placeholder="キーワード" style="padding: 5px 10px; font-family: inherit; border: 1px solid #b5ab93;">
            <button class="ans-btn" onclick="checkAnswer1()" style="padding: 4px 15px; font-family: inherit; background: #f4ece1; border: 1px solid #b5ab93; cursor: pointer;">送信</button>
        </div>
    </div>

    <script>
        function checkAnswer1() {
            const answer = document.getElementById("solve-input").value.trim();
            // 正解は「ウシロウ（またはウシロ）」
            if (answer === "ウシロウ" || answer === "ウシロ") {
                alert("異変が収まりました。");
                // ブラウザにクリア情報を保存
                localStorage.setItem("clear_story1", "true");
                // マイページ（room.html）に戻る
                window.location.href = "room.html";
            } else {
                alert("何も起きない。何かが違うようだ。");
            }
        }
    </script>

    <footer class="fiction-footer">※この物語はフィクションです。実在の人物・団体・事件等とは一切関係ありません。</footer>
</body>
</html>
