<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻想の庭 - 入口</title>
    <link rel="stylesheet" href="/pokemon-selector/java/style.css">
    <style>
        /* ログイン画面専用のシンプルな中央寄せ配置 */
        .gate-wrapper {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px 20px;
            text-align: center;
        }
        .gate-question {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #333333;
        }
        /* 昔ながらのシンプルな入力フォーム */
        .gate-input {
            font-family: inherit;
            font-size: 1.1rem;
            padding: 8px 12px;
            width: 250px;
            border: 1px solid #b5ab93;
            background-color: #ffffff;
            text-align: center;
            outline: none;
            margin-bottom: 25px;
        }
        /* 飾り気のない素朴なボタン */
        .gate-btn {
            font-family: inherit;
            font-size: 1rem;
            padding: 6px 24px;
            background: #f4ece1;
            color: #333;
            border: 1px solid #b5ab93;
            cursor: pointer;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .gate-btn:hover {
            background: #e6dbcf;
        }
    </style>
</head>
<body style="background-color: #fcfaf2;">

    <div class="gate-wrapper">
        
        <div class="gate-question">あなたの名前は？</div>
        
        <div>
            <input type="text" id="username-input" class="gate-input" placeholder="お名前" maxlength="15">
        </div>
        
        <div>
            <button id="register-submit-btn" class="gate-btn" onclick="goToNovelRoom()">庭に入る</button>
        </div>

    </div>

    <script>
        // ページが読み込まれた際、過去のクリア状況などを一度リセットして最初から遊べるようにする
        document.addEventListener("DOMContentLoaded", () => {
            localStorage.clear();
        });

        // Enterキーが押されたときもボタンクリックと同じ動きをする設定
        document.getElementById("username-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") goToNovelRoom();
        });

        function goToNovelRoom() {
            const input = document.getElementById("username-input").value.trim();
            
            if (!input) {
                alert("名前を入力してください。");
                return;
            }
            
            // 入力されたユーザー名をブラウザに一時保存
            localStorage.setItem("savedPlayerName", input);
            
            // 完全に別のページ「room.html（幻想の庭 目次）」へ移動
            window.location.href = "room.html";
        }
    </script>

    <footer class="fiction-footer">※この物語はフィクションです。実在の人物・団体・事件等とは一切関係ありません。</footer>

</body>
</html>
