<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小説投稿プラットフォーム「ヨムノベル」</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="register-body">

    <div class="reg-container">
        <div class="reg-box">
            <div class="reg-logo">YomuNovel</div>
            <p class="reg-sub">〜新時代の読書体験を、あなたに〜</p>
            <p>サービスを利用するためにユーザー名をご登録ください。</p>
            
            <input type="text" id="username-input" class="reg-input" placeholder="例：タロウ" maxlength="15">
            <button id="register-submit-btn" class="reg-btn" onclick="goToNovelPage()">登録して読み始める</button>
        </div>
    </div>

    <script>
        // Enterキーでも進めるようにする設定
        document.getElementById("username-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") goToNovelPage();
        });

        function goToNovelPage() {
            const input = document.getElementById("username-input").value.trim();
            if (!input) {
                alert("ユーザー名を入力してください。");
                return;
            }
            
            // 入力された名前をブラウザのメモリ（localStorage）に保存（次のページに引き継ぐため）
            localStorage.setItem("savedPlayerName", input);
            
            // 次の「novel.html」へページを丸ごと移動させる
            window.location.href = "novel.html";
        }
    </script>
</body>
</html>
