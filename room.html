<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - ヨムノベル</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 段階的な怪奇演出用のCSS --- */
        
        /* 初期状態：ノーマル */
        .status-phase-0 { background-color: #f4f6f9; transition: all 1.5s ease; }

        /* 異変1クリア：少し薄暗くなり、フォントが不穏に */
        .status-phase-1 { 
            background-color: #e2e5ec !important; 
            color: #111;
        }
        .status-phase-1 .room-desc { color: #8b0000 !important; }

        /* 異変2クリア：さらに暗く、画面がときどき微振動する */
        .status-phase-2 { 
            background-color: #2b2d31 !important; 
            color: #eee !important;
        }
        .status-phase-2 nav { background: #1e1f22 !important; border-bottom: 1px solid #333 !important; }
        .status-phase-2 .nav-logo { color: #ff3333 !important; }
        .status-phase-2 .user-badge { background: #383a40 !important; color: #fff; }
        .status-phase-2 .room-container h2 { color: #ff3333 !important; }
        .status-phase-2 .room-desc { color: #bbb !important; }
        .status-phase-2 .story-card { background: #1e1f22 !important; border: 1px solid #444 !important; color: #fff !important; }
        .status-phase-2 .story-card p { color: #fff !important; }

        /* 中間ニュース後（異変3クリア・後半戦）：赤黒く染まり、完全にバグった部屋 */
        .status-phase-3 { 
            background-color: #110000 !important; 
            color: #ff3333 !important;
            animation: room-glitch-shake 0.3s infinite alternate;
        }
        .status-phase-3 nav { background: #000000 !important; border-bottom: 1px solid #cc0000 !important; }
        .status-phase-3 .nav-logo { color: #ff0000 !important; letter-spacing: 4px; }
        .status-phase-3 .user-badge { background: #220000 !important; color: #ff3333; border: 1px solid #ff0000; }
        .status-phase-3 .room-container h2 { color: #ff0000 !important; text-shadow: 0 0 8px #ff0000; }
        .status-phase-3 .room-desc { color: #ff6666 !important; font-weight: bold; }
        .status-phase-3 .story-card { background: #050000 !important; border: 1px solid #ff0000 !important; color: #fff !important; box-shadow: 0 0 15px rgba(255,0,0,0.2) !important; }
        .status-phase-3 .story-card p { color: #ff3333 !important; }
        .status-phase-3 .story-link-btn { background: #cc0000 !important; box-shadow: 0 2px 8px rgba(200, 0, 0, 0.5) !important; }

        @keyframes room-glitch-shake {
            0% { transform: translate(0, 0) skewX(0deg); }
            50% { transform: translate(1px, -1px) skewX(0.5deg); }
            100% { transform: translate(-1px, 1px) skewX(-0.5deg); }
        }
    </style>
</head>

        <div class="user-badge">ようこそ、 <span id="display-name
