<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻想の逝き庭 - 個人小説サイト</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .story-item {
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }
    </style>
</head>
<body id="room-body">

    <div class="site-wrapper">
        <div class="site-header">
            <h1 class="site-title" id="site-title-text">幻想の逝き庭</h1>
            <p class="site-subtitle">管理人：ヨム / オンライン小説書きの個人創作サイトです。</p>
        </div>

        <div class="info-section">
            <h2 class="info-title">📌 管理人から緊急の連絡</h2>
            <p class="info-p" id="info-comment-text" style="font-weight: bold;">
                </p>
        </div>

        <div class="novel-list-section">
            <h2 class="info-title">◆ 短編小説（連載一覧）</h2>
            <ul style="list-style: none; padding-left: 0; line-height: 2;">
                
                <li id="item-story1" class="story-item">
                    <a href="story1.html" class="novel-link">第一章「ついてくるもの」</a> 
                    <span id="badge-story1" style="font-size: 0.8rem; margin-left: 10px; color: #0066cc;">【 未読 】</span>
                    <p style="font-size: 0.85rem; color: #666; margin: 5px 0 0 0;">夕暮れの帰り道。僕の後ろをぴったりと歩く、正体不明の影の正体とは……。</p>
                </li>

                <li id="item-story2" class="story-item" style="display: none;">
                    <a href="story2.html" class="novel-link">第二章「バグと視線」</a> 
                    <span id="badge-story2" style="font-size: 0.8rem; margin-left: 10px; color: #0066cc;">【 未読 】</span>
                    <p style="font-size: 0.85rem; color: #666; margin: 5px 0 0 0;">スマートフォンの画面が真っ赤に染まる。バグの奥から誰かが見つめている。</p>
                </li>

                <li id="item-story3" class="story-item" style="display: none;">
                    <a href="story3.html" class="novel-link">第三章「歪む空間」</a> 
                    <span id="badge-story3" style="font-size: 0.8rem; margin-left: 10px; color: #0066cc;">【 未読 】</span>
                    <p style="font-size: 0.85rem; color: #666; margin: 5px 0 0 0;">部屋全体がガタガタと悲鳴をあげる。この空間のどこかに、呪いの核がある。</p>
                </li>

            </ul>
        </div>
    </div>

    <button id="dev-reset-btn" onclick="devResetData()">⚙ データを初期化してテスト</button>

    <style>
        #dev-reset-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #333333; color: #ffffff; border: 1px solid #666666;
            padding: 10px 15px; font-size: 0.85rem; cursor: pointer; border-radius: 5px;
            z-index: 99999; font-family: sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        #dev-reset-btn:hover { background: #cc0000; border-color: #ff0000; }
    </style>

    <script>
        window.onload = function() {
            updateRoomProgress();
        };

        function updateRoomProgress() {
            const bodyEl = document.getElementById("room-body");
            const titleEl = document.getElementById("site-title-text");
            const commentEl = document.getElementById("info-comment-text");

            const c1 = localStorage.getItem("clear_story1") === "true";
            const c2 = localStorage.getItem("clear_story2") === "true";
            const c3 = localStorage.getItem("clear_story3") === "true";

            // --- 進行度に応じた「管理人コメント」と「サイト崩壊演出」の切り替え ---
            if (c3) {
                // 【3章クリア後（全クリ状態）】
                bodyEl.className = "phase-3";
                titleEl.innerText = "幻想の逝き庭";
                commentEl.innerHTML = "アクセスしてはいけない。もう手遅れだ。すべてが壊れていく。";
                commentEl.style.color = "#cc0000";
            } 
            else if (c2) {
                // 【2章クリア後（3章解放時）】
                bodyEl.className = "phase-2";
                titleEl.style.color = "#cc0000";
                commentEl.innerHTML = "警告：サイト内のテキストが勝手に書き換わる深刻なバグが発生しています。現在原因究明中ですが、体調に異変を感じた方はすぐにブラウザを閉じてください。";
                commentEl.style.color = "#cc0000";
            } 
            else if (c1) {
                // 【1章クリア後（2章解放時）】
                bodyEl.className = "phase-1";
                titleEl.style.color = "";
                commentEl.innerHTML = "お知らせ：最近、一部の読者様から「小説を読んでいる最中に画面がおかしくなる」「視線を感じる」との報告を受けております。当サイトは安全なスクリプトのみを使用しておりますのでご安心ください。";
                commentEl.style.color = "#555555";
            } 
            else {
                // 【初期状態（リセット後・1章のみ公開時）】
                bodyEl.className = "";
                titleEl.style.color = "";
                commentEl.innerHTML = "管理人からのお知らせ：短編ホラー小説の不定期連載を開始しました！まずは第一章からお楽しみください。感想は掲示板までどうぞ。";
                commentEl.style.color = "#333333";
            }

            // --- 章の出現＆バッジ書き換え処理 ---
            if (c1) {
                document.getElementById("badge-story1").innerText = "【 既読 】";
                document.getElementById("badge-story1").style.color = "#888888";
                document.getElementById("item-story2").style.display = "block";
            }
            if (c2) {
                document.getElementById("badge-story2").innerText = "【 既読 】";
                document.getElementById("badge-story2").style.color = "#888888";
                document.getElementById("item-story3").style.display = "block";
            }
            if (c3) {
                document.getElementById("badge-story3").innerText = "【 既読 】";
                document.getElementById("badge-story3").style.color = "#888888";
            }
        }

        function devResetData() {
            if (confirm("【開発者用確認】クリアデータをすべて初期化して、最初の状態に戻しますか？")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>

    <footer class="fiction-footer">※この物語はフィクションです。実在の人物・団体・事件等とは一切関係ありません。</footer>
</body>
</html>
